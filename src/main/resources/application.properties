spring.application.name=looplock-engine

# --- DataSource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/looplock
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Flyway owns the schema; Hibernate only validates entities match it at startup.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# --- SpringDoc / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.show-actuator=false
springdoc.swagger-ui.tags-sorter=alpha

# Suppress deprecated Spring Data Page serialization warning (Boot 3.3+)
spring.data.web.pageable.serialize-page-in-json-using-dto=true
